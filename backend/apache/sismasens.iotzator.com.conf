# SISMASENS — Apache VirtualHost
# Copia in /etc/apache2/sites-available/ e abilita con:
#   a2ensite sismasens.iotzator.com
#   systemctl reload apache2
#
# Moduli richiesti (abilitati con a2enmod):
#   proxy proxy_http proxy_wstunnel ssl rewrite headers

# ── HTTP: acme-challenge + redirect HTTPS ────────────────────────────────────
<VirtualHost *:80>
    ServerName sismasens.iotzator.com

    # Permette a certbot (webroot) di rispondere alle challenge ACME
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName sismasens.iotzator.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/sismasens.iotzator.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sismasens.iotzator.com/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # WebSocket eventi (deve stare PRIMA della regola /api/ e /)
    ProxyPass        /events/ws  ws://127.0.0.1:8002/events/ws
    ProxyPassReverse /events/ws  ws://127.0.0.1:8002/events/ws

    # API FastAPI — proxy su loopback:8002
    ProxyPass        /api/  http://127.0.0.1:8002/
    ProxyPassReverse /api/  http://127.0.0.1:8002/

    # Dashboard React — proxy su loopback:3001
    ProxyPass        /  http://127.0.0.1:3001/
    ProxyPassReverse /  http://127.0.0.1:3001/
</VirtualHost>
