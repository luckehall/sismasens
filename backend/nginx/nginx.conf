worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name sismasens.iotzator.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name sismasens.iotzator.com;

        ssl_certificate     /etc/letsencrypt/live/sismasens.iotzator.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sismasens.iotzator.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Dashboard
        location / {
            proxy_pass http://dashboard:80;
            proxy_set_header Host $host;
        }

        # API
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket eventi
        location /events/ws {
            proxy_pass http://api:8000/events/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }
}
