services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: sismasens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sismasens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sismasens}
      POSTGRES_DB: sismasens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sismasens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sismasens-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sismasens:${POSTGRES_PASSWORD:-sismasens}@postgres:5432/sismasens
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MQTT_TOKEN_SECRET: ${MQTT_TOKEN_SECRET:-change-me-mqtt-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_ORIGINS: '["https://sismasens.iotzator.com","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"   # Esposto solo su loopback — Apache fa da proxy

  # ---------------------------------------------------------------------------
  # MQTT Ingestor
  # ---------------------------------------------------------------------------
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: sismasens-ingestor
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sismasens:${POSTGRES_PASSWORD:-sismasens}@postgres:5432/sismasens
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      MQTT_INGESTOR_USER: ingestor
      MQTT_INGESTOR_PASS: ${MQTT_INGESTOR_PASS:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # EMQX Broker MQTT
  # ---------------------------------------------------------------------------
  emqx:
    image: emqx/emqx:5.6.0
    container_name: sismasens-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: sismasens
      # Auth JWT
      EMQX_AUTHENTICATION__1__MECHANISM: jwt
      EMQX_AUTHENTICATION__1__FROM: password
      EMQX_AUTHENTICATION__1__USE_JWKS: "false"
      EMQX_AUTHENTICATION__1__ALGORITHM: "hmac-based"
      EMQX_AUTHENTICATION__1__SECRET: ${MQTT_TOKEN_SECRET:-change-me-mqtt-secret}
      EMQX_AUTHENTICATION__1__SECRET_BASE64_ENCODED: "false"
      # TLS listener 8883 — usa i certificati Let's Encrypt montati dall'host
      EMQX_LISTENERS__SSL__DEFAULT__ENABLED: "true"
      EMQX_LISTENERS__SSL__DEFAULT__BIND: "0.0.0.0:8883"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: "/etc/emqx/certs/fullchain.pem"
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: "/etc/emqx/certs/privkey.pem"
    ports:
      - "1883:1883"              # MQTT plain — per debug locale e ingestor fallback
      - "8883:8883"              # MQTT/TLS — usato da Home Assistant
      - "127.0.0.1:18083:18083" # Dashboard admin EMQX — solo loopback
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./broker/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      # Cert copiati da /etc/letsencrypt con permessi 644 (EMQX gira come uid 1000)
      # Aggiornati automaticamente da /etc/letsencrypt/renewal-hooks/deploy/sismasens-emqx.sh
      - ./broker/emqx/certs/fullchain.pem:/etc/emqx/certs/fullchain.pem:ro
      - ./broker/emqx/certs/privkey.pem:/etc/emqx/certs/privkey.pem:ro
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dashboard React (build statica servita da nginx interno)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: sismasens-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"    # Esposto solo su loopback — Apache fa da proxy

volumes:
  postgres_data:
  emqx_data:
  emqx_log:
