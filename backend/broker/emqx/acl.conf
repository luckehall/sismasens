%% EMQX ACL — Controllo accessi MQTT SISMASENS
%%
%% Formato: {allow|deny, all|{user,"username"}, pub|sub|pubsub, ["topic"]}.
%%
%% Regole:
%%   - L'ingestor puo' subscribare su tutti i topic sismasens/events/#
%%   - Ogni sensore puo' pubblicare SOLO sul proprio topic (verificato dal JWT sub claim)
%%   - Nessun accesso non autorizzato

%% Ingestor: puo' subscribare su tutti gli eventi
{allow, {user, "ingestor"}, subscribe, ["sismasens/events/#"]}.

%% Sensori autenticati: possono pubblicare solo sul proprio topic
%% EMQX 5.x: ${username} viene sostituito con l'username MQTT del client
{allow, all, publish, ["sismasens/events/${username}"]}.

%% Nega tutto il resto
{deny, all, all, ["#"]}.
