## EMQX ACL — Controllo accessi MQTT SISMASENS
##
## Formato: {allow|deny, all|{user,"username"}, pub|sub|pubsub, ["topic"]}.
##
## Regole:
##   - L'ingestor può subscribare su tutti i topic sismasens/events/#
##   - Ogni sensore può pubblicare SOLO sul proprio topic (verificato dal JWT sub claim)
##   - Nessun accesso non autorizzato

%% Ingestor: può subscribare su tutti gli eventi
{allow, {user, "ingestor"}, subscribe, ["sismasens/events/#"]}.

%% Sensori autenticati: possono pubblicare solo sul proprio topic
%% EMQX JWT: usa il claim "sub" come username → topic sismasens/events/{username}
{allow, {user, "$username"}, publish, ["sismasens/events/$username"]}.

%% Nega tutto il resto
{deny, all, all, ["#"]}.
